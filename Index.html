<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Secure Portal</title>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-blue-500 tracking-tight">PORTAL</h1>
            <p class="text-slate-400 mt-2">Sign in to your account</p>
        </div>

        <form class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Email</label>
                <input type="email" placeholder="email@example.com" required 
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-600 focus:outline-none text-white">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Password</label>
                <input type="password" placeholder="••••••••" required 
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-600 focus:outline-none text-white">
            </div>

            <button type="submit" 
                class="w-full py-4 bg-blue-600 hover:bg-blue-500 font-bold rounded-xl transition-all shadow-lg active:scale-95">
                LOG IN
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="#" class="text-sm text-slate-500 hover:text-blue-400 transition">Need an account? Sign up</a>
        </div>
    </div>

</body>
</html>
